<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Example Item Placeholder</title>
  <desc id="desc">Neutral placeholder image for collection items.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a3b47" />
      <stop offset="100%" stop-color="#306658" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)" />
  <rect x="120" y="120" width="960" height="660" rx="24" fill="#202224" stroke="#b39797" stroke-width="8" />
  <circle cx="330" cy="390" r="82" fill="#dd6c2f" opacity="0.85" />
  <rect x="470" y="320" width="430" height="36" rx="8" fill="#ff7e75" opacity="0.9" />
  <rect x="470" y="380" width="360" height="28" rx="8" fill="#ffdfdf" opacity="0.9" />
  <rect x="470" y="430" width="300" height="28" rx="8" fill="#ffdfdf" opacity="0.75" />
  <text x="600" y="655" text-anchor="middle" fill="#ffdfdf" font-size="44" font-family="Arial, sans-serif">Example Image</text>
</svg>
